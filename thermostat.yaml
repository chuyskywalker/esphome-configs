#########
#
# For the circulation mode, just turn on the blower and erv every 60 minutes for N minutes
#
# If the climate controller is already heating/cooling, then it's basically a no-op.
#
# IF the climate controller kicks on during the N minutes, that's fine, still circulating
#
# Setup an binary flag "circulation".
# Setup an interval that triggers every 60 minutes and takes these actions:
#  - sets the flag to true
#  - turns on the fans
#  - delays for N minutes (configured value)
#  - checks to see if the CC is idle, if so, turn off the fans
# 
# Then, in the CC idle action, only turn off the fans if the climate flag is false. This way if the idle triggers "early", it'll keep the fans off.
# If the circulation duration is very short (say 5 minutes) it won't turn off the fans when the system is trying to heat/cool
#
#######

interval:
  - interval: 60min
    startup_delay: 60min  # don't run right on startup; wait until an hour has passed
    then:
      - if:
          condition: 
            - lambda: 'return id(circulation_minutes_per_hour).state > 0;'
          then:
            - logger.log: "Starting circulation mode"
            # if CC is already running, do not turn on switches nor set label
            - if:
                condition:
                  - lambda: 'return id(cc).action == CLIMATE_ACTION_IDLE;'
                then:
                  - logger.log: "Circulation mode activated: CC is idle, turned on fans and set label"
                  - switch.turn_on: blower_fan
                  - switch.turn_on: erv
                else:
                  - logger.log: "Circulation mode activated: CC is non-idle (maybe even off); no action required, fan is on"
            - globals.set:
                id: circulation_active
                value: '1'
            # delay returns in ms; 1000ms in a second, 60 seconds in a minute
            - delay: !lambda "return id(circulation_minutes_per_hour).state * 60 * 1000;"
              # if the erv/blower is still on AND the unit is also "idle" (or off), then turn off the erv/blower
            - logger.log: "circulation mode complete, check to turn off"
            - globals.set:
                id: circulation_active
                value: '0'
            - if:
                condition:
                  - switch.is_on: erv
                  - switch.is_on: blower_fan
                  - lambda: 'return id(cc).action == CLIMATE_ACTION_IDLE;'
                then:
                  - logger.log: "Circulation mode complete: turned off"
                  - switch.turn_off: blower_fan
                  - switch.turn_off: erv
                else:
                  - logger.log: "Circulation mode complete: CC is non-idle (or off) or the fans are already off, no action needed"
          else:
              - logger.log: "Circulation mode disabled by 0 value minutes per hour"
climate:
  - platform: thermostat
    id: cc
    name: "Thermostat Climate Controller"
    sensor: onboard_temp
    min_cooling_off_time: 300s
    min_cooling_run_time: 300s
    min_heating_off_time: 300s
    min_heating_run_time: 300s
    min_idle_time: 30s

    cool_action:
      - switch.turn_on:  heatpump
      - switch.turn_off: heatpump_heating_mode
      - switch.turn_on:  blower_fan
      - switch.turn_on:  erv
      - lvgl.label.update:
          id: label_heat_status
          text_color: 0xAAAAAA
      - lvgl.label.update:
          id: label_cool_status
          text_color: 0x26C1E8

    heat_action:
      - switch.turn_on:  heatpump
      - switch.turn_on:  heatpump_heating_mode
      - switch.turn_on:  blower_fan
      - switch.turn_on:  erv
      - lvgl.label.update:
          id: label_heat_status
          text_color: 0xE33535
      - lvgl.label.update:
          id: label_cool_status
          text_color: 0xAAAAAA

    idle_action:
      - switch.turn_off: heatpump
      - switch.turn_off: heatpump_heating_mode
      # if circulation_active is off (false, 0), then go ahead and turn off the fans, otherwise leave them on till the interval turns them off
      - if:
          condition:
            - lambda: 'return id(circulation_active) == 0;'
          then:
            - switch.turn_off:  blower_fan
            - switch.turn_off:  erv
      # if this was triggered via a hold time, turn the blower/erv off anyway
      - if:
          condition:
            - lambda: 'return id(hold_time).state == 1;'
          then:
            - switch.turn_off:  blower_fan
            - switch.turn_off:  erv

    ## heat and cool mode are implied by the heat/cool _action above,
    ## off mode is always a thing, but heat_cool_mode is NOT implied
    ## by the existence of heat and cool mode. That's....super neat.
    # heat_mode: 
    # cool_mode: 
    # off_mode:
    heat_cool_mode: true ## just enable the mode, we don't need any actions taken
    
    default_preset: Home
    preset:
      - name: Home
        default_target_temperature_low: "65 °F"
        default_target_temperature_high: "75 °F"
