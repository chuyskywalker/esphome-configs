esphome:
  name: thermostat
  friendly_name: Thermostat
  platformio_options:
    build_flags: "-DBOARD_HAS_PSRAM"
    board_build.esp-idf.memory_type: qio_opi
    board_build.flash_mode: dio
  on_boot:
    priority: 800                     # High priority boot sequence
    then:
      - output.turn_on: lcd_power
      - output.turn_on: display_reset
      - delay: 100ms
      - output.turn_off: display_reset
      - delay: 100ms
      - output.turn_on: tp_reset
      - delay: 100ms
      - output.turn_off: tp_reset
      - delay: 120ms
      - output.turn_on: tp_reset
      - delay: 120ms

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: y
      CONFIG_ESP32S3_DATA_CACHE_64KB: y
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y

psram:
  mode: octal
  speed: 80MHz 

logger:
  level: DEBUG
  
debug:
  update_interval: 30s
  
api:
  encryption:
    key: !secret thermostat_api_encryption_key

ota:
  - platform: esphome
    password: !secret thermostat_ota_password

mdns:
  disabled: false

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

i2c:
  sda: 38
  scl: 39
  id: bus_a
  scan: true

spi:
  clk_pin: 2
  mosi_pin: 1

xl9535:
  - id: xl9535_hub
    address: 0x20

pcf8574:
  - id: pcf
    address: 0x21

switch:

  - platform: gpio
    id: heatpump
    name: heatpump
    pin:
      xl9535: xl9535_hub
      number: 0
      mode:
        output: true
      inverted: false
    on_turn_off:
      - lvgl.label.update:
          id: label_heat_status
          text_color: 0xAAAAAA
      - lvgl.label.update:
          id: label_cool_status
          text_color: 0xAAAAAA

  - platform: gpio
    id: heatpump_heating_mode
    name: heatpump_heating_mode
    pin:
      xl9535: xl9535_hub
      number: 1
      mode:
        output: true
      inverted: false
    on_turn_off:
      - lvgl.label.update:
          id: label_heat_status
          text_color: 0xAAAAAA
      - lvgl.label.update:
          id: label_cool_status
          text_color: 0xAAAAAA

  - platform: gpio
    id: blower_fan
    name: blower_fan
    pin:
      xl9535: xl9535_hub
      number: 2
      mode:
        output: true
      inverted: false
    on_turn_on:
      - lvgl.label.update:
          id: label_fan_status
          text_color: 0x00ff00
    on_turn_off:
      - lvgl.label.update:
          id: label_fan_status
          text_color: 0xAAAAAA

  - platform: gpio
    id: erv
    name: erv
    pin:
      xl9535: xl9535_hub
      number: 3
      mode:
        output: true
      inverted: false
    on_turn_on:
      - lvgl.label.update:
          id: label_erv_status
          text_color: 0x00ff00
    on_turn_off:
      - lvgl.label.update:
          id: label_erv_status
          text_color: 0xAAAAAA

touchscreen:
  - platform: cst816
    id: my_touchscreen
    i2c_id: bus_a
    address: 0x15
    update_interval: 50ms
    skip_probe: true
    transform:
      swap_xy: false
      mirror_x: false
      mirror_y: false
    on_touch:
      - if:
          condition: lvgl.is_paused
          then:
            - logger.log: "LVGL resuming"
            - lvgl.resume:
            - lvgl.widget.redraw:
            - light.turn_on: lcd_backlight

# Map PCF8574 pins:
# P0: Touch reset (output)
# P2: Touch interrupt (input) – unused
# P3: LCD power (output)
# P4: LCD reset (output)
# P5: Encoder button (input pull-up)
output:
  - platform: ledc
    pin: 6
    id: bl_pwm
    frequency: 19531Hz

  - platform: gpio
    id: lcd_power
    pin:
      pcf8574: pcf
      number: 3
      mode:
        output: true
      inverted: false

  - platform: gpio
    id: tp_reset
    pin:
      pcf8574: pcf
      number: 0
      mode:
        output: true

  - platform: gpio
    id: display_reset
    pin:
      pcf8574: pcf
      number: 4
      mode:
        output: true
      inverted: true


# Display driver configuration
display:
  - platform: st7701s                 # ST7701S display controller driver
    id: rgb_panel                     # Unique ID for display

    ## per esphome docs
    auto_clear_enabled: false
    update_interval: never
    ## /per esphome docs

    spi_mode: MODE3                   # SPI communication mode 3 (CPOL=1, CPHA=1)
    color_order: RGB                  # Color data order (RGB)
    invert_colors: false              # Do not invert display colors
    dimensions:
      width: 480                      # Display width in pixels
      height: 480                     # Display height in pixels
    cs_pin: 16                        # SPI chip select pin
    de_pin: 40                        # Display data enable pin
    hsync_pin: 15                     # Horizontal sync pin
    vsync_pin: 7                      # Vertical sync pin
    pclk_pin: 41                      # Pixel clock pin
    data_pins:  # RGB data pins for ST7701S (5R/6G/5B configuration)
      red: [46, 3, 8, 18, 17]          # Red channel data pins
      green: [14, 13, 12, 11, 10, 9]   # Green channel data pins
      blue: [5, 45, 48, 47, 21]        # Blue channel data pins
    # Display timing parameters (per ST7701S datasheet)
    hsync_front_porch: 20              # Horizontal front porch pixels
    hsync_pulse_width: 10              # Horizontal sync pulse width
    hsync_back_porch: 10               # Horizontal back porch pixels
    vsync_front_porch: 8               # Vertical front porch lines
    vsync_pulse_width: 10              # Vertical sync pulse width
    vsync_back_porch: 10               # Vertical back porch lines
    show_test_card: false              # Disable default test pattern
    pclk_frequency: 18MHz              # Pixel clock frequency (18MHz)
    pclk_inverted: true                # Invert pixel clock signal
    init_sequence:  # ST7701S initialization command sequence (manufacturer specified)
      - [0x01]                        # Software reset command
      - delay 120ms                    # Wait for reset completion
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x10]  # Extended command set
      - [0xC0, 0x3B, 0x00]            # Power control 1
      - [0xC1, 0x0B, 0x02]            # Power control 2
      - [0xC2, 0x00, 0x02]            # Power control 3
      - [0xCC, 0x10]                  # Panel control
      - [0xCD, 0x08]                  # Panel control
      - [0xB0, 0x02, 0x13, 0x1B, 0x0D, 0x10, 0x05, 0x08, 0x07, 0x07, 0x24, 0x04, 0x11, 0x0E, 0x2C, 0x33, 0x1D]  # Gamma setting 1
      - [0xB1, 0x05, 0x13, 0x1B, 0x0D, 0x11, 0x05, 0x08, 0x07, 0x07, 0x24, 0x04, 0x11, 0x0E, 0x2C, 0x33, 0x1D]  # Gamma setting 2
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x11]  # Extended command set
      - [0xB0, 0x5d]                  # VCOM control 1
      - [0xB1, 0x43]                  # VCOM control 2
      - [0xB2, 0x81]                  # VCOM control 3
      - [0xB3, 0x80]                  # VCOM control 4
      - [0xB5, 0x43]                  # Frame rate control
      - [0xB7, 0x85]                  # Power saving control
      - [0xB8, 0x20]                  # Display mode control
      - [0xC1, 0x78]                  # Gamma adjustment 1
      - [0xC2, 0x78]                  # Gamma adjustment 2
      - [0xD0, 0x88]                  # Power control 4
      - [0xE0, 0x00, 0x00, 0x02]      # Color enhancement 1
      - [0xE1, 0x03, 0xA0, 0x00, 0x00, 0x04, 0xA0, 0x00, 0x00, 0x00, 0x20, 0x20]  # Color enhancement 2
      - [0xE2, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]  # Color enhancement 3
      - [0xE3, 0x00, 0x00, 0x11, 0x00]  # Color enhancement 4
      - [0xE4, 0x22, 0x00]            # Color enhancement 5
      - [0xE5, 0x05, 0xEC, 0xA0, 0xA0, 0x07, 0xEE, 0xA0, 0xA0, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]  # Color enhancement 6
      - [0xE6, 0x00, 0x00, 0x11, 0x00]  # Color enhancement 7
      - [0xE7, 0x22, 0x00]            # Color enhancement 8
      - [0xE8, 0x06, 0xED, 0xA0, 0xA0, 0x08, 0xEF, 0xA0, 0xA0, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]  # Color enhancement 9
      - [0xEB, 0x00, 0x00, 0x40, 0x40, 0x00, 0x00, 0x00]  # Color enhancement 10
      - [0xEd, 0xFF, 0xFF, 0xFF, 0xBA, 0x0A, 0xBF, 0x45, 0xFF, 0xFF, 0x54, 0xFB, 0xA0, 0xAB, 0xFF, 0xFF, 0xFF]  # Color enhancement 11
      - [0xEF, 0x10, 0x0D, 0x04, 0x08, 0x3F, 0x1F]  # Color enhancement 12
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x13]  # Extended command set
      - [0xEF, 0x08]                  # Display control
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x00]  # Exit extended command set
      - [0x36, 0x08]                  # Memory access control (rotation)
      - [0x3A, 0x60]                  # Interface pixel format (RGB565)
      - [0x11]                        # Exit sleep mode
      - delay 100ms                    # Wait for display to wake up
      - [0x29]                        # Turn on display
      - delay 50ms                    # Wait for display to activate

light:
  - platform: monochromatic
    id: lcd_backlight
    name: "LCD Backlight"
    output: bl_pwm
    default_transition_length: 0s
    restore_mode: ALWAYS_ON

globals:
  # a boolean (1|0) to denote that fan circulation should be active
  - id: circulation_active
    type: int
    initial_value: '0'

sensor:

  - platform: sht4x
    temperature:
      id: onboard_temp
      name: "Temperature"
      device_class: "temperature"
      state_class: "measurement"
      unit_of_measurement: "°C"
      on_value: 
        then:
          - lvgl.label.update:
              id: label_temp_current
              text: 
                format: "%.1f"
                args: [ 'celsius_to_fahrenheit(x)' ]
    humidity:
      id: onboard_rh
      name: "Relative Humidity"
      device_class: "humidity"
      state_class: "measurement"
      unit_of_measurement: "%"

  # Rotary encoder: brightness on page 1, volume on page 2
  - platform: rotary_encoder
    id: knob
    name: "Encoder"
    pin_b:
      number: 42
      mode:
        input: true
        pullup: true
    pin_a:
      number: 4
      mode:
        input: true
        pullup: true
    resolution: 2
    min_value: -100
    max_value:  100

    # When turned clockwise
    on_clockwise:
      - logger.log: "clock wise"
      - if:        
          condition:
            lvgl.page.is_showing: temp_page
          then:
            - number.increment:     
                id: target_temp
                cycle: false
      - if:        
          condition:
            lvgl.page.is_showing: hold_page
          then:
            - number.increment:     
                id: hold_time
                cycle: false
      - if:        
          condition:
            lvgl.page.is_showing: range_page
          then:
            - number.increment:     
                id: target_temp_range
                cycle: false
      - if:        
          condition:
            lvgl.page.is_showing: fan_page
          then:
            - number.increment:
                id: circulation_minutes_per_hour
                cycle: false

    # When turned anticlockwise
    on_anticlockwise:
      - logger.log: "anti clock wise"
      - if:        
          condition:
            lvgl.page.is_showing: temp_page
          then:
            - number.decrement:     
                id: target_temp
                cycle: false
      - if:        
          condition:
            lvgl.page.is_showing: hold_page
          then:
            - number.decrement:     
                id: hold_time
                cycle: false
      - if:        
          condition:
            lvgl.page.is_showing: range_page
          then:
            - number.decrement:     
                id: target_temp_range
                cycle: false
      - if:        
          condition:
            lvgl.page.is_showing: fan_page
          then:
            - number.decrement:
                id: circulation_minutes_per_hour
                cycle: false

text_sensor:
  - platform: wifi_info
    ip_address:
      id: ip_address
      name: "IP Address"
      icon: mdi:ip-network
      entity_category: diagnostic
      on_value:
        then:
          - lvgl.label.update:
              id: ip_address_label
              text:
                format: "%s"
                args: [ 'id(ip_address).state.c_str()' ]

binary_sensor:

  # Encoder button: just wake screen / keep alive
  # fun fun -- right now, on my unit, the encoder button resets the unit. Cool.
  - platform: gpio
    id: encoder_button
    name: "Encoder Button"
    pin:
      pcf8574: pcf
      number: 5
      mode:
        input: true
      inverted: true   # pressed = ON (low)

  # These are mostly for state reporting and metrics
  - platform: template
    name: "Heating"
    lambda: 'return (id(heatpump).state && id(heatpump_heating_mode).state);'

  - platform: template
    name: "Cooling"
    lambda: 'return (id(heatpump).state && !id(heatpump_heating_mode).state);'

  - platform: template
    name: "ERV"
    lambda: 'return (id(erv).state);'

  - platform: template
    name: "Circulating" # if the ERV and blower are on and the heatpump is NOT, we are in pure circulation mode
    lambda: 'return (id(erv).state && id(blower_fan).state && !id(heatpump).state);'

font:
  - id: roboto16
    file: "gfonts://Roboto"
    size: 16
  - id: roboto20
    file: "gfonts://Roboto"
    size: 20
  - id: roboto22_bold
    file:
      type: gfonts
      family: Roboto
      weight: 700
    size: 22    
  - id: roboto32
    file: "gfonts://Roboto"
    size: 32
    bpp: 4
    extras:
      - file: "fonts/materialdesignicons-webfont.ttf"
        glyphs: [
          "\U000F0238", # mdi-fire
          "\U000F0717", # mdi-snowflake
          "\U000F0210", # mdi-fan
          "\U000F0D43", # mdi-air-filter
          "\U000F04E1", # mdi-swap-horizontal
          "\U000F073A", # mdi-cancel
          ]
  - id: roboto100
    file: "gfonts://Roboto"
    size: 100

script:
  - id: update_range
    then:
      - lambda: |-
          float t_target = id(target_temp).state;
          float t_range = id(target_temp_range).state;
          float low = t_target - t_range;
          float high = t_target + t_range;
          auto call = id(cc).make_call();
          call.set_target_temperature_low(fahrenheit_to_celsius(low));
          call.set_target_temperature_high(fahrenheit_to_celsius(high));
          call.perform();
          
number:
  - platform: template
    id: display_timeout
    name: LVGL Screen timeout
    optimistic: true
    unit_of_measurement: "s"
    initial_value: 45
    restore_value: true
    min_value: 10
    max_value: 180
    step: 5
    mode: box

  - platform: template
    id: target_temp
    name: Target Temperature
    optimistic: true
    initial_value: 72
    unit_of_measurement: "°F"
    restore_value: true
    min_value: 40
    max_value: 90
    step: 1
    on_value:
      - lvgl.label.update:
          id: label_temp_setpoint
          text:
            format: "%.0f °F"
            args: [ 'x' ]
      - script.execute: update_range

  - platform: template
    id: hold_time
    name: Hold Time
    optimistic: true
    initial_value: 0
    restore_value: true
    min_value: 0
    max_value: 1
    step: 1
    on_value:
      # if hold mode is turned on..., else...
      - if:
          condition: 
            - lambda: 'return x == 1;'
          then:
            # HOLD PLEASE
            - lvgl.label.update:
                id: label_hold_time
                text: "ON"
            - climate.control:
                id: cc
                mode: "OFF"
            - switch.turn_off: erv
            - lvgl.widget.show: cancel_icons
          else:
            - lvgl.label.update:
                id: label_hold_time
                text: "OFF"
            - lvgl.widget.hide: cancel_icons
            - climate.control:
                id: cc
                mode: "HEAT_COOL"

  - platform: template
    id: target_temp_range
    name: Target Temp Range
    optimistic: true
    initial_value: 3
    restore_value: True
    unit_of_measurement: "°F"
    min_value: 2
    max_value: 30
    step: 1
    on_value:
      - lvgl.label.update:
          id: label_temp_range
          text:
            format: "%.0f"
            args: [ 'x' ]
      - script.execute: update_range

  - platform: template
    id: circulation_minutes_per_hour
    name: Circulation Minutes per Hour
    optimistic: true
    initial_value: 20
    unit_of_measurement: "minutes"
    restore_value: true
    min_value: 0
    max_value: 60
    step: 1
    on_value:
      - lvgl.label.update:
          id: label_fan_timer
          text:
            format: "%.0f"
            args: [ 'x' ]


# LVGL configuration
lvgl:
  displays:
    - rgb_panel
  
  touchscreens:
    - my_touchscreen

  encoders:
    - sensor: knob
      enter_button: encoder_button
      group: menu_group

  on_idle:
    timeout: !lambda "return (id(display_timeout).state * 1000);"
    then:
      - logger.log: "LVGL is idle"
      - light.turn_off: lcd_backlight
      - delay: 0.5s
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:
      - lvgl.page.show: temp_page
      - lvgl.pause:
          show_snow: true

  default_font: roboto16
  scroll_on_focus: false
  
  theme:
    label:
      text_color: 0xFFFFFF

  style_definitions:
    - id: page_style
      bg_color: 0x000000  # Black background
    - id: icon
      text_color: 0xAAAAAA
      text_font: roboto32
      text_align: CENTER

  pages:

    # Main Menu Page
    - id: temp_page
      skip: false
      scrollable: false
      styles: [page_style]
      # on_swipe_right:
      #   - lvgl.page.previous:
      #       animation: OUT_RIGHT
      #       time: 300ms
      on_swipe_left:
        - lvgl.page.next:
            animation: OUT_LEFT
            time: 300ms
      widgets:

        - label:
            text: "Current Temp"
            x: 0
            y: -100
            align: CENTER
            text_font: roboto32

        - label:
            id: label_temp_current
            text: "-"
            x: 0
            y: 0
            align: CENTER
            text_font: roboto100

        - label:
            id: label_cool_status
            text: "\U000F0717"
            styles: [icon]
            x: 0
            y: 330
            width: 180
            height: 32
            long_mode: CLIP
            text_align: right

        - label:
            id: label_temp_setpoint
            text: "-"
            x: 190
            y: 330
            width: 110
            height: 40
            text_align: center
            text_font: roboto32
            long_mode: CLIP
            border_color: 0x999999
            border_width: 2
            radius: 15

        - label:
            id: label_heat_status
            text: "\U000F0238"
            styles: [icon]
            x: 310
            y: 330
            width: 180
            height: 32
            long_mode: CLIP
            text_align: left

        - label:
            id: label_fan_status
            text: "\U000F0210"
            styles: [icon]
            x: 0
            y: 380
            width: 230
            height: 32
            long_mode: CLIP
            text_align: right
        - label:
            id: label_erv_status
            text: "\U000F0D43"
            styles: [icon]
            x: 250
            y: 380
            width: 230
            height: 32
            long_mode: CLIP
            text_align: left

        - container:
            id: cancel_icons
            hidden: true
            clickable: false
            click_focusable: false
            x: 0
            y: 0
            width: 480
            height: 480
            widgets:
            - label:
                text: "\U000F073A"  # cancel
                # over cooling
                styles: [icon]
                x: 0
                y: 330
                width: 180
                height: 32
                long_mode: CLIP
                text_align: right
                text_color: 0xAA2222
                clickable: false
                click_focusable: false
            - label:
                text: "\U000F073A"  # cancel
                # over heat
                styles: [icon]
                x: 310
                y: 330
                width: 180
                height: 32
                long_mode: CLIP
                text_align: left
                text_color: 0xAA2222
                clickable: false
                click_focusable: false
            - label:
                text: "\U000F073A"  # cancel
                # over fan
                styles: [icon]
                x: 0
                y: 380
                width: 230
                height: 32
                long_mode: CLIP
                text_align: right
                text_color: 0xAA2222
                clickable: false
                click_focusable: false
            - label:
                text: "\U000F073A"  # cancel
                # over erv
                styles: [icon]
                x: 250
                y: 380
                width: 230
                height: 32
                long_mode: CLIP
                text_align: left
                text_color: 0xAA2222
                clickable: false
                click_focusable: false

        # - label:
        #     text: "\uF053"
        #     text_font: montserrat_48
        #     align: CENTER
        #     x: -200

        - label:
            text: "\uF054"
            text_font: montserrat_48
            align: CENTER
            x: 200


    - id: hold_page
      skip: false
      scrollable: false
      styles: [page_style]
      on_swipe_right:
        - lvgl.page.previous:
            animation: OUT_RIGHT
            time: 300ms
      on_swipe_left:
        - lvgl.page.next:
            animation: OUT_LEFT
            time: 300ms
      widgets:
        - label:
            text: "System Hold"
            x: 0
            y: -100
            align: CENTER
            text_font: roboto32
        - label:
            id: label_hold_time
            text: "On/Off"
            x: 0
            y: 0
            align: CENTER
            text_font: roboto100
        - label:
            text: "Turn on to prevent\nsystem operation"
            x: 0
            y: +100
            align: CENTER
            text_font: roboto32
        - label:
            text: "\uF053"
            text_font: montserrat_48
            align: CENTER
            x: -200
        - label:
            text: "\uF054"
            text_font: montserrat_48
            align: CENTER
            x: 200

    - id: range_page
      skip: false
      scrollable: false
      styles: [page_style]
      on_swipe_right:
        - lvgl.page.previous:
            animation: OUT_RIGHT
            time: 300ms
      on_swipe_left:
        - lvgl.page.next:
            animation: OUT_LEFT
            time: 300ms
      widgets:
        - label:
            text: "Tempature Range"
            x: 0
            y: -100
            align: CENTER
            text_font: roboto32
        - label:
