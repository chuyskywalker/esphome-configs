esphome:
  name: rgbcct
  friendly_name: rgbcct

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

ethernet:
  type: W5500
  clk_pin: GPIO13
  mosi_pin: GPIO11
  miso_pin: GPIO12
  cs_pin: GPIO14
  interrupt_pin: GPIO10
  reset_pin: GPIO09

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret rgbcct_api_encryption_key

# allow for remote updates
ota:
  - platform: esphome
    password: !secret rgbcct_ota_password

# ALL THE DATA
sensor:

  # Our star of the show, the water spiny boy
  - platform: pulse_counter
    pin: GPIO47
    name: "S1 Water Flow"
    update_interval: 15s
    # https://www.dataq.com/resources/pdfs/datasheets/flow-sensor-ds.pdf
    # is 450 rotations for 1 liter/minute
    # 1 L = 0.264172 G
    #
    # Ultimately, since I mostly use this as "is flowing" binary, 
    # getting the conversion spot on isn't super relevant.
    filters:
      - lambda: return (x / 450.0) * 0.264172;
    unit_of_measurement: "gal/min"
    icon: "mdi:water"
    device_class: "volume_flow_rate"
    state_class: "measurement"
    accuracy_decimals: 1

  # Our star of the show, the water spiny boy TWO
  - platform: pulse_counter
    pin: GPIO48
    name: "S2 Water Flow"
    update_interval: 15s
    # https://www.dataq.com/resources/pdfs/datasheets/flow-sensor-ds.pdf
    # is 450 rotations for 1 liter/minute
    # 1 L = 0.264172 G
    #
    # Ultimately, since I mostly use this as "is flowing" binary, 
    # getting the conversion spot on isn't super relevant.
    filters:
      - lambda: return (x / 450.0) * 0.264172;
    unit_of_measurement: "gal/min"
    icon: "mdi:water"
    device_class: "volume_flow_rate"
    state_class: "measurement"
    accuracy_decimals: 1

  # Attached a temp/humidity to track the crawlspace, just because.
  - platform: dht
    model: "DHT22"
    pin: GPIO21
    temperature:
      name: "Temperature"
      unit_of_measurement: "°C"
      device_class: "temperature"
      state_class: "measurement"
      accuracy_decimals: 1
    humidity:
      name: "Humidity"
      unit_of_measurement: "%"
      device_class: "humidity"
      state_class: "measurement"
      accuracy_decimals: 1
    update_interval: 15s

    