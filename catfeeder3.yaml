esphome:
  name: catfeeder3
  friendly_name: CatFeeder3

esp8266:
  board: d1_mini_lite

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret catfeeder3_api_encryption_key

ota:
  - platform: esphome
    password: !secret catfeeder3_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Catfeeder3 Fallback Hotspot"
    password: !secret fallback_ap_pass

captive_portal:

# have a turns counter
# when the motor is turned on, set the turns counter to N (where N >= 1)
# the motor is already running (the gpio switch did as much)
# wait until the turns counter drops to zero (or below) -- or more than 10 seconds have passed
# turn off the motor
#
# configure the motor lobed switch to decrement the counter when it is triggered

globals:
  - id: turns
    type: int
    restore_value: no
    initial_value: '2'

number:
  - platform: template
    name: "Feed Turn Count"
    id: feed_turns
    min_value: 1
    max_value: 15
    step: 1
    optimistic: True
    initial_value: 2
    restore_value: True

  - platform: template
    name: "Loading Turn Count"
    id: load_turns
    min_value: 1
    max_value: 25
    step: 1
    optimistic: True
    initial_value: 15
    restore_value: True

  - platform: template
    name: "Feed Count"
    id: feed_count
    min_value: 0
    max_value: 9999999
    step: 1
    optimistic: True
    initial_value: 0
    restore_value: True

binary_sensor:
  - platform: gpio
    pin:
      number: D2 ## GPIO 4
      mode:
        input: true
        pullup: true
    name: "Rotation Counterdown Switch"
    internal: true
    on_press:
      - lambda: |
          ESP_LOGD("turncounter", "Turns count is: %i", id(turns));
          if (id(turns) > 0) { 
            id(turns)--;
            ESP_LOGD("turncounter", "Decremented");
          } else {
            ESP_LOGD("turncounter", "Skipped");
          }
#    on_release:
#      - lambda: 'ESP_LOGD("turncounter", "Released; tc is: %i", id(turns));'
#    on_state:
#      - lambda: 'ESP_LOGD("turncounter", "State; tc is: %i", id(turns));'

button:
  - platform: template
    name: "Uptick Counter"
    id: counter_inc
    on_press:
      - number.increment: feed_count

  - platform: template
    name: "Single Feed"
    id: single_feed
    on_press:
      - lambda: 'id(turns) = (int)id(feed_turns).state;'
      - switch.turn_on: motor
      - wait_until:
          condition:
            lambda: 'return (id(turns) <= 0);'
          timeout: 10s
      - switch.turn_off: motor
      - homeassistant.event:
          event: esphome.cat_fed
          data:
            message: Cat was fed
      - number.increment: feed_count

  - platform: template
    name: "Load Conveyor"
    id: load_conveyor
    on_press:
      - lambda: 'id(turns) = (int)id(load_turns).state;'
      - switch.turn_on: motor
      - wait_until:
          condition:
            lambda: 'return (id(turns) <= 0);'
          timeout: 30s  # longer timeout for conveyor loading
      - switch.turn_off: motor

switch:
  - platform: gpio
    pin: GPIO15  # D8 defaults to low/off; wired to GND and GPIO
    id: motor
    internal: True

time:
  - platform: homeassistant
    id: homeassistant_time
    on_time:
      # < 2026-04-29: Every day @ 1am, 7am, 5pm (17)
      # < 2026-04-29: More frequent, smaller meals now -- Every 3 hours (8 feeds per day)
      - seconds: 0
        minutes: 0
        hours: 1,4,7,10,13,16,19,22
        then:
          - button.press: single_feed
      # Reset feed count at midnight
      - seconds: 0
        minutes: 0
        hours: 0
        then:
          - number.to_min: feed_count
