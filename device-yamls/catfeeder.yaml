esphome:
  name: catfeeder
  friendly_name: Cat Feeder

esp8266:
  board: d1_mini_lite

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret catfeeder_api_encryption_key

ota:
  password: !secret catfeeder_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Catfeeder Fallback Hotspot"
    password: !secret fallback_ap_pass

captive_portal:

switch:
  - platform: gpio
    pin: D1
    id: feedmotor
    name: "Dispense Single Meal"
    icon: "mdi:cat"
    on_turn_on:
      - delay: !lambda |-
          if (id(cat_feed_time_single).state) {
              return id(cat_feed_time_single).state;
          } else {
              return 500;
          }
      - switch.turn_off: feedmotor
      - homeassistant.event:
          event: esphome.cat_fed
          data:
            message: Cat was fed

  - platform: gpio
    pin: D1
    id: loadfeeder
    name: "Load Feeder"
    icon: "mdi:reload"
    on_turn_on:
      - delay: !lambda |-
          if (id(cat_load_time).state) {
              return id(cat_load_time).state;
          } else {
              return 5000;
          }
      - switch.turn_off: loadfeeder

time:
  - platform: homeassistant
    id: homeassistant_time
    on_time:
      # Every day @ 1am, 7am (removed 5pm/17 as sam wasn't eating as much/switched more to wet food)
      - seconds: 0
        minutes: 0
        hours: 1,7
        then:
          - switch.turn_on: feedmotor

sensor:
  - platform: homeassistant
    name: "cat_feed_time_single"
    entity_id: input_number.cat_feed_time_single
    id: cat_feed_time_single
  - platform: homeassistant
    name: "cat_load_time"
    entity_id: input_number.cat_load_time
    id: cat_load_time
