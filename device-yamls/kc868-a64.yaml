# Individual inputs
binary_sensor:

# 1-40 are all RJ45 wired sensor inputs; 1-26 (inclusive) are simple reed switch; 27-40 are 12v supplied water sensors

  - platform: gpio
    name: "a64_input01"
    id: a64_input01
    pin:
      pcf8574: pcf8574_hub_in_1
      number: 0
      mode: INPUT
      inverted: false
    filters:
      - delayed_on: 100ms
    on_press:
      then:
        - switch.turn_on: a64_light01
    on_release:
      then:
        - switch.turn_off: a64_light01

  - platform: gpio
