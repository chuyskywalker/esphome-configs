esphome:
  name: kc868-a64
  friendly_name: KC868-A64
#  platform: esp32
#  board: esp32dev

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret kc868_a64_api_encryption_key

ota:
  - platform: esphome
    password: !secret kc868_a64_ota_password

#wifi:
#  ssid: !secret wifi_ssid
#  password: !secret wifi_password
#
#  # Enable fallback hotspot (captive portal) in case wifi connection fails
#  ap:
#    ssid: "Kc868-A64 Fallback Hotspot"
#    password: !secret fallback_ap_pass

#captive_portal:
    
# i2c configuration
i2c:
   - id: bus_a
     sda: 5
     scl: 16
     scan: true
     frequency: 400kHz
   - id: bus_b
     sda: 15
     scl: 4
     scan: true
     frequency: 400kHz
     

# Example configuration entry
ethernet:
  type: LAN8720
  mdc_pin: GPIO23
  mdio_pin: GPIO18
  clk_mode: GPIO17_OUT
  phy_addr: 0

  # # Optional manual IP
  # manual_ip:
  #   static_ip: 192.168.1.198
  #   gateway: 192.168.1.1
  #   subnet: 255.255.255.0  


# I/O Expansion boards
pcf8574:
  - id: 'pcf8574_hub_out_1'  # for output channel 1-16
    i2c_id: bus_a
    address: 0x24
    pcf8575: true

  - id: 'pcf8574_hub_out_2'  # for output channel 17-32
    i2c_id: bus_a
    address: 0x25
    pcf8575: true

  - id: 'pcf8574_hub_out_3'  # for output channel 33-48
    i2c_id: bus_a
    address: 0x21
    pcf8575: true

  - id: 'pcf8574_hub_out_4'  # for output channel 49-64
    i2c_id: bus_a
    address: 0x22
    pcf8575: true
    
  - id: 'pcf8574_hub_in_1'  # for a64--input channel 1-16
    i2c_id: bus_b
    address: 0x24
    pcf8575: true

  - id: 'pcf8574_hub_in_2'  # for a64--input channel 17-32
    i2c_id: bus_b
    address: 0x25
    pcf8575: true

  - id: 'pcf8574_hub_in_3'  # for a64--input channel 33-48
    i2c_id: bus_b
    address: 0x21
    pcf8575: true

  - id: 'pcf8574_hub_in_4'  # for a64--input channel 49-64
    i2c_id: bus_b
    address: 0x22
    pcf8575: true   
    
# Individual outputs
switch:

# switches 1-40 mirror the binary state from binary_sensors 1-40

  - platform: gpio
    name: "a64_light01"
    id: a64_light01
