esphome:
  name: gl-s10-other
  friendly_name: Other GL-S10
  name_add_mac_suffix: false
  project:
    name: gl-s10.bluetooth-proxy
    version: "2.1"
  # turn on Power LED when esphome boots
  on_boot:
    then:
      - output.turn_on: power_led

esp32:
  board: esp32doit-devkit-v1
  framework:
    type: esp-idf

# Configuration fo V2.3 hardware revision
ethernet:
  type: IP101
  mdc_pin: GPIO23
  mdio_pin: GPIO18
  #clk_mode: GPIO0_IN
  clk:
    pin: GPIO0
    mode: CLK_EXT_IN
  phy_addr: 1
  power_pin: GPIO5

api:
  encryption:
    key: !secret gl_s10_other_api_encryption_key

logger:

ota:
  - platform: esphome
    password: !secret gl_s10_other_ota_password

# no web server needed
#web_server:

