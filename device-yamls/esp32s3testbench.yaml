esphome:
  name: esp32s3testbench
  friendly_name: Garage Fan

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret esp32s3testbench_api_encryption_key

ota:
  - platform: esphome
    password: !secret esp32s3testbench_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

switch:
  - platform: gpio
    id: fan1
    pin: GPIO39
    inverted: true
    interlock: &interlock_group [fan1, fan2, fan3, fan4]
    restore_mode: ALWAYS_OFF
  - platform: gpio
    id: fan2
    pin: GPIO40
    inverted: true
    interlock: *interlock_group
    restore_mode: ALWAYS_OFF
  - platform: gpio
    id: fan3
    pin: GPIO41
    inverted: true
    interlock: *interlock_group
    restore_mode: ALWAYS_OFF
  - platform: gpio
    id: fan4
    pin: GPIO42
    inverted: true
    interlock: *interlock_group
    restore_mode: ALWAYS_OFF

fan:
  - platform: template
    id: gfan
    name: "Fan"
    restore_mode: ALWAYS_OFF
    speed_count: 4
    on_turn_off: 
      - switch.turn_off: fan1
      - switch.turn_off: fan2
      - switch.turn_off: fan3
      - switch.turn_off: fan4
    on_turn_on:
      - script.execute:
          id: setspeed
          speed: !lambda 'return (int) id(gfan).speed;'
    on_speed_set:
      - if:
          condition:
            - fan.is_on: gfan
          then:
            - script.execute:
                id: setspeed
                speed: !lambda 'return (int) x;'

script:
  - id: setspeed
    parameters:
      speed: int
    then:
      - logger.log:
          format: "Fan speed set to: %d!"
          args: [ speed ]
      - switch.turn_off: fan1
      - switch.turn_off: fan2
      - switch.turn_off: fan3
      - switch.turn_off: fan4
      - delay: 250ms
      - if:
          condition: 
            - lambda: 'return speed == 1;'
          then:
            - switch.turn_on: fan1
      - if:
          condition: 
            - lambda: 'return speed == 2;'
          then:
            - switch.turn_on: fan2
      - if:
          condition: 
            - lambda: 'return speed == 3;'
          then:
            - switch.turn_on: fan3
      - if:
          condition: 
            - lambda: 'return speed == 4;'
          then:
            - switch.turn_on: fan4
