logger:
  # level: VERY_VERBOSE

button:
  - platform: safe_mode
    name: Safe Mode Boot
    entity_category: diagnostic

## DEVICE SPECIFIC CONFIGURATION
# network LED (white one) configured as status led
status_led:
  pin:
    number: GPIO32
    inverted: true

# button on the side labeled RESET
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO33
      inverted: true
    name: "Reset Button"

  - platform: ble_presence
    ibeacon_uuid: '1B6295D5-4F74-4C58-A2D8-CD83CA26BDF4'
    name: "Trashcan"
    

sensor:
  # RSSI based on iBeacon UUID
  - platform: ble_rssi
    ibeacon_uuid: '1B6295D5-4F74-4C58-A2D8-CD83CA26BDF4'
    name: "Trashcan RSSI"


# output settings for LED's marked Power and Bluetooth
# power LED use: see code line 15
# bluetooth LED use: see code line 60
output:
  - platform: gpio
    pin: GPIO14
    inverted: true
    id: power_led
  - platform: gpio
    pin: GPIO12
    inverted: true
    id: bluetooth_led

# since these pins are broken out inside and labeled as I2C pins they're configured here
i2c:
  sda: 15
  scl: 13
  scan: true
