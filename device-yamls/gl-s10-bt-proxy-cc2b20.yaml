substitutions:
  name: gl-s10-bt-proxy-cc2b20
  friendly_name: Garage GL-S10

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false
  project:
    name: gl-s10.bluetooth-proxy
    version: "2.1"
  # turn on Power LED when esphome boots
  on_boot:
    then:
      - output.turn_on: power_led

esp32:
  board: esp32doit-devkit-v1
  framework:
    type: esp-idf

# Configuration fo V2.3 hardware revision
ethernet:
  type: IP101
  mdc_pin: GPIO23
  mdio_pin: GPIO18
  #clk_mode: GPIO0_IN
  clk:
    pin: GPIO0
    mode: CLK_EXT_IN
  phy_addr: 1
  power_pin: GPIO5

api:
  encryption:
    key: !secret gl_s10_bt_proxy_cc2b20_api_encryption_key

# logger:

ota:
  - platform: esphome
    password: !secret gl_s10_bt_proxy_cc2b20_ota_password

web_server:

# esp32_ble_tracker:
#   scan_parameters:
#     interval: 1100ms
#     window: 1100ms
#     active: true
#
# The LED is disabled for ESPHome 2023.6.0+ since we do not
# decode the advertising packets on device anymore, and adding
# the LED blink would force the device to decode the packets
# just to blink the LED.
#
# Bluetooth LED blinks when receiving Bluetooth advertising
#  on_ble_advertise:
#    then:
#      - output.turn_on: bluetooth_led
#      - delay: 0.5s
#      - output.turn_off: bluetooth_led

# bluetooth_proxy:
#   active: true

esp32_ble_tracker:
  scan_parameters:
    active: False
  on_ble_advertise:
   then:
     - output.turn_on: bluetooth_led
     - delay: 0.5s
     - output.turn_off: bluetooth_led

