esphome:
  name: musicboxv2
  friendly_name: MusicBoxV2
  on_boot:
    then:
      - number.set: 
          id: vol
          value: 10

esp32:
  board: esp32dev
  framework:
    type: esp-idf  # v1 has "arduino" here; not sure if needed

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret musicboxv2_api_encryption_key

ota:
  - platform: esphome
    password: !secret musicboxv2_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Musicboxv2 Fallback Hotspot"
    password: !secret fallback_ap_pass

captive_portal:

uart:
  tx_pin: GPIO23
  rx_pin: GPIO22
  baud_rate: 9600

dfplayer:
  id: dfplayerState

globals:
   - id: track_list
     type: int[4]
     restore_value: yes
     initial_value: '{1,2,3,4}'

number:
  - platform: template
    internal: True
    id: should_be_playing
    step: 1
    min_value: 1
    max_value: 9
    initial_value: 2
    optimistic: True
    on_value_range:
    - above: 0
      below: 5 
      then:
        - logger.log: "stop via number"
        - dfplayer.stop
    - above: 5
      below: 10 
      then:
        - logger.log: "play random via number"
        - dfplayer.play_mp3: !lambda |-
            int al = sizeof(id(track_list))/sizeof(id(track_list)[0]); //length calculation
            return id(track_list)[int(rand() % (al-1))];

  - platform: template
    internal: False
    id: vol
    name: Volume
    step: 1
    min_value: 1
    max_value: 30
    optimistic: True
    on_value: 
      then:
        - logger.log: "changing volume"
        - dfplayer.set_volume: !lambda return x;

binary_sensor:

  - platform: template
    name: Is Playing
    internal: False
    lambda: |-
      return id(dfplayerState).is_playing();

  - platform: gpio
    pin:
      number: GPIO21
      mode:
        input: true
        pullup: true
    name: "Stop or Play Random"
    id: startstop
    internal: True
    on_press:
      - logger.log: "stop / play"
      - button.press: brandorstop
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms

  - platform: gpio
    pin:
      number: GPIO1
      mode:
        input: true
        pullup: true
    name: "Volume Up"
    id: volup
    internal: True
    on_press:
      - logger.log: "vol up"
      - button.press: bvolup
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms

  - platform: gpio
    pin:
      number: GPIO3
      mode:
        input: true
        pullup: true
    name: "Volume Down"
    id: voldown
    internal: True
    on_press:
      - logger.log: "vol down"
      - button.press: bvoldown
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms

button:
  - platform: template
    name: "Off"
    id: offs
    on_press:
      - number.set: 
          id: should_be_playing
          value: 2

  - platform: template
    name: "Stop / Play"
    id: brandorstop
    on_press:
      if:
        condition:
          - number.in_range: 
              id: should_be_playing
              above: 5
        then:
          - number.set: 
              id: should_be_playing
              value: 2
        else:
          - number.set: 
              id: should_be_playing
              value: 7


  - platform: template
    name: "Volume Up"
    id: bvolup
    on_press:
      - number.increment: vol

  - platform: template
    name: "Volume Down"
    id: bvoldown
    on_press:
      - number.decrement: vol
